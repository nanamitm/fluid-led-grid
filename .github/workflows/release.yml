name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          modules: 'qtsensors'
          cache: true

      - name: Configure and Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"
          cmake --build build --config Release

      - name: Deploy Dependencies (windeployqt)
        shell: pwsh
        run: |
          mkdir deploy
          copy build\Release\fluid-led-grid.exe deploy\
          windeployqt --qmldir qml --no-compiler-runtime deploy\fluid-led-grid.exe

      - name: Archive Release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -eq "main" -or $version -eq "") { $version = "latest" }
          Compress-Archive -Path deploy\* -DestinationPath "FluidLedGrid-Windows-${version}.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: FluidLedGrid-Windows-*.zip

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-render-util0-dev \
            libxcb-xinerama0-dev \
            libxcb-icccm4-dev \
            libegl1-mesa-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          modules: 'qtsensors'
          install-deps: 'true'
          cache: true

      - name: Configure and Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          cmake --build build

      - name: Download linuxdeploy & Qt Plugin
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          QML_SOURCES_PATHS: ${{ github.workspace }}/qml
        run: |
          VERSION="${{ github.ref_name }}"
          if [ "${{ github.ref_type }}" != "tag" ]; then
            VERSION="latest"
          fi
          export VERSION
          export QMAKE=$QT_ROOT_DIR/bin/qmake

          cp resources/app_256.png resources/fluid-led-grid.png

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable build/fluid-led-grid \
            --desktop-file resources/fluid-led-grid.desktop \
            --icon-file resources/fluid-led-grid.png \
            --plugin qt \
            --output appimage

          # ツール本体を削除（リリースファイルに混入しないよう）
          rm -f linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: Fluid_LED_Grid-*.AppImage

      - name: Upload Build Logs (failure only)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: linux-build-logs
          path: |
            cmake_configure.log
            cmake_build.log

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FluidLedGrid-Windows-*.zip
            Fluid_LED_Grid-*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
